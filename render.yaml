services:
  - type: web
    name: rental-api
    env: node
    region: ohio
    branch: main
    repo: https://github.com/Yemen-ye/rental-management
    healthCheckPath: /api/health
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && npx prisma migrate deploy && node dist/main.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rental-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
      - key: CORS_ORIGIN
        value: https://rental-frontend.onrender.com
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info

  - type: web
    name: rental-frontend
    env: static
    branch: main
    repo: https://github.com/Yemen-ye/rental-management
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://rental-api.onrender.com/api

databases:
  - name: rental-db
    region: ohio
    plan: free
    databaseType: postgresql
    ipAllowList: []
